baseURL = "https://your-domain.com/"
locale = "en-us"
languageCode = "en-US"
defaultContentLanguage = "en"
theme = "lowkey"
title = "My Blog"
enableRobotsTXT = true
summaryLength = 20
paginate = 10

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    hl_inline = false
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = true
    noHl = false
    style = "dracula"
    tabWidth = 4